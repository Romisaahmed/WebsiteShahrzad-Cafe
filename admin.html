<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Shahrzad Bookings</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Montserrat',sans-serif; background:#faf7f2; color:#2d0a18; }
        .admin-header {
            background:#2d0a18; color:#fff; padding:20px 5%;
            display:flex; justify-content:space-between; align-items:center;
        }
        .admin-header h1 { font-size:22px; letter-spacing:3px; }
        .admin-header span { color:#c5a059; font-size:13px; }
        .admin-body { max-width:1100px; margin:40px auto; padding:0 5%; }
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:20px; margin-bottom:40px; }
        .stat-card { background:#fff; border-radius:15px; padding:25px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.05); }
        .stat-card .num { font-size:36px; font-weight:800; color:#2d0a18; }
        .stat-card .lbl { font-size:12px; color:#999; margin-top:5px; }
        .bookings-table { background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.06); }
        .table-header { background:#2d0a18; color:#fff; padding:20px 25px; display:flex; justify-content:space-between; align-items:center; }
        .table-header h2 { font-size:16px; }
        .clear-btn { background:#c5a059; color:#2d0a18; border:none; padding:8px 20px; border-radius:20px; cursor:pointer; font-weight:700; font-size:12px; }
        table { width:100%; border-collapse:collapse; }
        th { background:#f8f5f0; padding:14px 20px; text-align:left; font-size:12px; color:#999; text-transform:uppercase; letter-spacing:0.5px; }
        td { padding:16px 20px; border-bottom:1px solid #f0ebe3; font-size:13px; }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:#faf7f2; }
        .badge { background:#2d0a18; color:#fff; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; }
        .empty { text-align:center; padding:60px; color:#bbb; }
        .empty i { font-size:48px; display:block; margin-bottom:15px; color:#e0d5cc; }
    </style>
</head>
<body>
<div class="admin-header">
    <h1>SHAHRZAD <span style="font-weight:400;letter-spacing:1px;">Admin</span></h1>
    <span><i class="fas fa-lock"></i> Bookings Dashboard</span>
</div>

<div class="admin-body">
    <div class="stats">
        <div class="stat-card">
            <div class="num" id="totalCount">0</div>
            <div class="lbl">Total Bookings</div>
        </div>
        <div class="stat-card">
            <div class="num" id="todayCount">0</div>
            <div class="lbl">Today's Bookings</div>
        </div>
        <div class="stat-card">
            <div class="num" id="roomCount">0</div>
            <div class="lbl">Unique Rooms</div>
        </div>
    </div>

    <div class="bookings-table">
        <div class="table-header">
            <h2><i class="fas fa-calendar-check" style="margin-right:10px;color:#c5a059;"></i> All Bookings</h2>
            <button class="clear-btn" onclick="clearAll()"><i class="fas fa-trash"></i> Clear All</button>
        </div>
        <div id="tableContainer">
            <div class="empty"><i class="fas fa-inbox"></i>No bookings yet.</div>
        </div>
    </div>
</div>

<script>
function loadBookings() {
    const bookings = JSON.parse(localStorage.getItem('shahrzad_bookings') || '[]');
    const today = new Date().toISOString().split('T')[0];

    document.getElementById('totalCount').textContent = bookings.length;
    document.getElementById('todayCount').textContent = bookings.filter(b => b.date === today).length;
    const rooms = new Set(bookings.map(b => b.roomName));
    document.getElementById('roomCount').textContent = rooms.size;

    const container = document.getElementById('tableContainer');
    if (bookings.length === 0) {
        container.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i>No bookings yet.</div>';
        return;
    }

    const rows = [...bookings].reverse().map((b, i) => `
        <tr>
            <td><strong>${bookings.length - i}</strong></td>
            <td>${b.name || '-'}</td>
            <td>${b.phone || '-'}</td>
            <td><span class="badge">${b.roomName || '-'}</span></td>
            <td>${b.date || '-'}</td>
            <td>${b.time || '-'}</td>
            <td>${b.hours ? b.hours + 'h' : '-'}</td>
        </tr>`).join('');

    container.innerHTML = `
        <table>
            <thead>
                <tr>
                    <th>#</th><th>Name</th><th>Phone</th><th>Room</th><th>Date</th><th>Time</th><th>Duration</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>`;
}

function clearAll() {
    if (confirm('Delete all bookings?')) {
        localStorage.removeItem('shahrzad_bookings');
        loadBookings();
    }
}

loadBookings();
</script>
</body>
</html>
